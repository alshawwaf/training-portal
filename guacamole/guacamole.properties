# Guacamole Properties
# https://guacamole.apache.org/doc/gug/configuring-guacamole.html

# guacd connection
guacd-hostname: guacd
guacd-port: 4822

# Enable debug logging to trace authentication issues
logback-level: debug

# JSON Authentication secret key
# NOTE: This is set via JSON_SECRET_KEY environment variable in docker-compose.yml
# The environment variable takes precedence over this file.
# DO NOT hardcode the key here - use .env file instead.
